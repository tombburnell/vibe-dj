<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Track Mapper</title>
    <script>
      (function () {
        var t = localStorage.getItem("track-mapper-theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
        else document.documentElement.setAttribute("data-theme", "dark");
        var d = localStorage.getItem("track-mapper-density");
        if (d === "comfortable" || d === "compact" || d === "ultra-compact")
          document.documentElement.setAttribute("data-density", d);
        else document.documentElement.setAttribute("data-density", "compact");
        var s = localStorage.getItem("track-mapper-ui-scale");
        if (s && !Number.isNaN(parseFloat(s))) document.documentElement.style.fontSize = s + "%";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
